version: "3.9"

services:

  # ─── BASE DE DATOS COMPARTIDA (cada servicio usa su propio schema) ───────────
  postgres:
    image: postgres:16-alpine
    container_name: comalas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: comalas
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - comalas_net

  # ─── MESSAGE BROKER ──────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: comalas_mq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${MQ_USER}
      RABBITMQ_DEFAULT_PASS: ${MQ_PASSWORD}
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Panel de administración http://localhost:15672
    networks:
      - comalas_net

  # ─── API GATEWAY ─────────────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: comalas_gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      URL_USUARIOS: http://servicio-usuarios:3001
      URL_PEDIDOS: http://servicio-pedidos:3002
      URL_MENU: http://servicio-menu:3003
      URL_NOTIFICACIONES: http://servicio-notificaciones:3004
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - comalas_net

  # ─── SERVICIO USUARIOS ───────────────────────────────────────────────────────
  servicio-usuarios:
    build: ./servicio-usuarios
    container_name: comalas_usuarios
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: comalas
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
    networks:
      - comalas_net

  # ─── SERVICIO PEDIDOS ────────────────────────────────────────────────────────
  servicio-pedidos:
    build: ./servicio-pedidos
    container_name: comalas_pedidos
    restart: unless-stopped
    environment:
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: comalas
      MQ_HOST: rabbitmq
      MQ_USER: ${MQ_USER}
      MQ_PASSWORD: ${MQ_PASSWORD}
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - comalas_net

  # ─── SERVICIO MENÚ ───────────────────────────────────────────────────────────
  servicio-menu:
    build: ./servicio-menu
    container_name: comalas_menu
    restart: unless-stopped
    environment:
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: comalas
    depends_on:
      - postgres
    networks:
      - comalas_net

  # ─── SERVICIO NOTIFICACIONES ─────────────────────────────────────────────────
  servicio-notificaciones:
    build: ./servicio-notificaciones
    container_name: comalas_notif
    restart: unless-stopped
    environment:
      PORT: 3004
      MQ_HOST: rabbitmq
      MQ_USER: ${MQ_USER}
      MQ_PASSWORD: ${MQ_PASSWORD}
      TWILIO_SID: ${TWILIO_SID}
      TWILIO_TOKEN: ${TWILIO_TOKEN}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM}
    depends_on:
      - rabbitmq
    networks:
      - comalas_net

volumes:
  postgres_data:

networks:
  comalas_net:
    driver: bridge
